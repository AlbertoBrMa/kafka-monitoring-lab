version: '3.8'

networks:
  spark-net:
    driver: bridge

services:
  zookeeper:
    image: confluentinc/cp-zookeeper
    networks:
      - spark-net
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - 22181:2181
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/2181'"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 15s

  kafka:
    image: confluentinc/cp-kafka:7.4.4
    networks:
      - spark-net
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - 29092:29092
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  producer:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    networks:
      - spark-net
    command: python producer/productor_metrics.py
    env_file:
      - ../.env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    restart: on-failure

  consumer:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    networks:
      - spark-net
    command: python consumer/consumidor_metrics.py
    env_file:
      - ../.env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    restart: on-failure
